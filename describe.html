<!DOCTYPE html>
<html lang="en">
<head>

<meta name="mobile-web-app-capable" content="yes">

<title>Describe It! · Picture Trainer</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%233B6FE0'/%3E%3Ccircle cx='44' cy='44' r='20' fill='none' stroke='white' stroke-width='8'/%3E%3Cline x1='58' y1='58' x2='76' y2='76' stroke='white' stroke-width='9' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
:root{
  --bg-0:#EEF2F8;
  --surface:rgba(255,255,255,0.66);
  --surface-strong:rgba(255,255,255,0.82);
  --surface-solid:#FBFCFE;
  --surface-stroke:rgba(255,255,255,0.75);
  --surface-edge:rgba(17,24,39,0.07);
  --scrim:rgba(12,16,28,0.20);
  --ink-900:#1B2233; --ink-700:#333B4E; --ink-600:#4A5468; --ink-400:#8A93A6;
  --success:#1FB97A; --success-glow:#46E3A4;
  --gold:#F2B53C; --silver:#AEB7C7; --bronze:#CE8E54;
  --accent:#3B6FE0; --accent-2:#E7B33C; --focus:#1B2233;
  --radius-card:26px;
  --shadow-glass:0 10px 30px -12px rgba(20,28,48,.28), 0 2px 8px -3px rgba(20,28,48,.18);
  --shadow-soft:0 6px 18px -10px rgba(20,28,48,.30);
  --photo-shadow:0 18px 50px -18px rgba(20,28,48,.55),0 4px 14px -6px rgba(20,28,48,.4);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,system-ui,sans-serif;
  --font-round:ui-rounded,"SF Pro Rounded",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
  --ease-anticipate:cubic-bezier(.34,1.56,.64,1);
  --ease-out-soft:cubic-bezier(.16,1,.3,1);
  --fs:1;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;height:100%;overscroll-behavior:none;background:var(--bg-0);}
body{font-family:var(--font);color:var(--ink-900);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;font-size:calc(16px*var(--fs));}
#bg-fallback{position:fixed;inset:0;z-index:0;background:
  radial-gradient(120% 90% at 12% 8%, #DCE7FF 0%, transparent 55%),
  radial-gradient(120% 100% at 88% 4%, #EAE6FF 0%, transparent 50%),
  radial-gradient(140% 120% at 70% 100%, #E4F6FF 0%, transparent 55%),
  linear-gradient(160deg,#EEF3FB,#E9EEF8 60%,#EAF1F9);}
canvas#bg{position:fixed;inset:0;z-index:1;display:block;width:100%;height:100%;}
canvas#fx{position:fixed;inset:0;z-index:90;pointer-events:none;width:100%;height:100%;}
.app-scrim{position:fixed;inset:0;z-index:2;pointer-events:none;background:radial-gradient(130% 100% at 50% 30%, transparent 40%, var(--scrim) 130%);}

#app{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;overflow:hidden;}
.screen{position:absolute;inset:0;display:none;flex-direction:column;}
#app[data-screen="gallery"] #screen-gallery{display:flex;}
#app[data-screen="picture"] #screen-picture{display:flex;}
/* picture view hides the aurora behind a flat colour to save GPU */
#app[data-screen="picture"]~#bg-fallback,#app[data-screen="picture"]~canvas#bg{opacity:0;}
#app[data-screen="picture"]~.app-scrim{opacity:0;}
#flatbg{position:fixed;inset:0;z-index:0;background:var(--bg-0);opacity:0;transition:opacity .3s;pointer-events:none;}
#app[data-screen="picture"]~#flatbg{opacity:1;}

.glass{background:var(--surface);-webkit-backdrop-filter:blur(22px) saturate(1.4);backdrop-filter:blur(22px) saturate(1.4);border:1px solid var(--surface-stroke);box-shadow:var(--shadow-glass);}
.btn{font-family:var(--font-round);font-weight:700;border:none;cursor:pointer;border-radius:16px;padding:13px 20px;font-size:calc(16px*var(--fs));
  transition:transform .15s var(--ease-out-soft),box-shadow .2s,background .2s,opacity .2s;touch-action:manipulation;color:#fff;background:var(--accent);
  box-shadow:0 8px 18px -8px color-mix(in srgb,var(--accent) 70%, transparent);}
.btn:active{transform:scale(.96);}
.btn.ghost{background:var(--surface-strong);color:var(--ink-900);box-shadow:var(--shadow-soft);}
.btn:disabled{opacity:.5;cursor:default;}
.btn:focus-visible,button:focus-visible,a:focus-visible{outline:3px solid var(--focus);outline-offset:2px;}

/* ============ GALLERY ============ */
#screen-gallery{overflow-y:auto;-webkit-overflow-scrolling:touch;}
.g-head{position:sticky;top:0;z-index:20;padding:max(12px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) 12px max(16px,env(safe-area-inset-left));
  background:var(--surface-strong);-webkit-backdrop-filter:blur(20px) saturate(1.4);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--surface-edge);box-shadow:var(--shadow-soft);}
.g-top{display:flex;align-items:center;gap:12px;max-width:1000px;margin:0 auto;}
.logo-badge{width:46px;height:46px;border-radius:14px;background:linear-gradient(150deg,var(--accent),color-mix(in srgb,var(--accent) 55%, #7A4FE0));
  display:grid;place-items:center;box-shadow:0 8px 18px -9px var(--accent);flex:none;animation:floaty 5s ease-in-out infinite;}
.logo-badge svg{width:26px;height:26px;}
.g-titles{flex:1;min-width:0;}
.g-title{font-family:var(--font-round);font-weight:800;font-size:calc(26px*var(--fs));letter-spacing:-.02em;line-height:1;
  background:linear-gradient(120deg,var(--ink-900),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;}
.g-sub{color:var(--ink-600);font-size:calc(13px*var(--fs));font-weight:600;margin-top:3px;}
.xlink{font-family:var(--font-round);font-weight:700;font-size:calc(14px*var(--fs));color:var(--ink-700);background:var(--surface-strong);
  border:1.5px solid var(--surface-edge);border-radius:13px;padding:9px 13px;text-decoration:none;white-space:nowrap;flex:none;}
.g-meterrow{max-width:1000px;margin:12px auto 2px;display:flex;align-items:center;gap:10px;}
.g-meter{flex:1;height:9px;border-radius:5px;background:rgba(120,130,150,.22);overflow:hidden;}
.g-meter>span{display:block;height:100%;width:0%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .5s var(--ease-out-soft);}
.g-meterlbl{font-family:var(--font-round);font-weight:800;font-size:calc(13px*var(--fs));color:var(--ink-700);white-space:nowrap;}
.region-filter{display:flex;gap:7px;max-width:1000px;margin:11px auto 0;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px;scrollbar-width:none;}
.region-filter::-webkit-scrollbar{display:none;}
.rf{font-family:var(--font-round);font-weight:700;font-size:calc(13.5px*var(--fs));color:var(--ink-600);background:var(--surface-strong);border:1.5px solid var(--surface-edge);
  border-radius:12px;padding:8px 13px;cursor:pointer;white-space:nowrap;touch-action:manipulation;}
.rf[aria-pressed="true"]{background:var(--accent);color:#fff;border-color:transparent;}

.g-body{max-width:1000px;margin:0 auto;width:100%;padding:6px 16px max(24px,env(safe-area-inset-bottom));}
.region-sec{margin:18px 0 4px;}
.region-sec.hide{display:none;}
.region-head{display:flex;align-items:center;gap:9px;margin:8px 2px;}
.region-dot{width:11px;height:11px;border-radius:50%;flex:none;}
.region-title{font-family:var(--font-round);font-weight:800;font-size:calc(15px*var(--fs));color:var(--ink-900);}
.region-count{margin-left:auto;font-size:calc(12px*var(--fs));font-weight:700;color:var(--ink-400);}
.thumb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;}
.thumb{position:relative;border-radius:20px;overflow:hidden;cursor:pointer;aspect-ratio:4/3;box-shadow:var(--shadow-glass);background:#dfe6f0;border:none;padding:0;display:block;touch-action:manipulation;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s var(--ease-out-soft);}
.thumb:hover img{transform:scale(1.05);}
.thumb .label{position:absolute;left:0;right:0;bottom:0;padding:30px 12px 11px;text-align:left;
  background:linear-gradient(transparent 30%,rgba(12,16,28,.82));color:#fff;}
.thumb .label .t{font-family:var(--font-round);font-weight:800;font-size:calc(16px*var(--fs));line-height:1.1;}
.thumb .label .s{font-size:calc(12px*var(--fs));opacity:.85;margin-top:2px;font-weight:600;}
.thumb .rbadge{position:absolute;top:9px;left:9px;width:13px;height:13px;border-radius:50%;box-shadow:0 0 0 3px rgba(255,255,255,.55);}
.thumb .pring{position:absolute;top:7px;right:7px;width:34px;height:34px;}
.thumb .pring .bg2{stroke:rgba(255,255,255,.45);} .thumb .pring .fg2{stroke:#fff;stroke-linecap:round;transition:stroke-dashoffset .5s var(--ease-out-soft);}
.thumb .donecheck{position:absolute;top:7px;right:7px;width:34px;height:34px;border-radius:50%;background:var(--success);display:none;place-items:center;color:#fff;font-weight:900;box-shadow:0 4px 10px -3px var(--success);}
.thumb.done .pring{display:none;} .thumb.done .donecheck{display:grid;}

/* ============ PICTURE VIEW ============ */
#screen-picture{background:transparent;}
.p-top{flex:none;display:flex;align-items:center;gap:8px;padding:max(10px,env(safe-area-inset-top)) max(12px,env(safe-area-inset-right)) 10px max(12px,env(safe-area-inset-left));z-index:30;
  background:var(--surface-strong);-webkit-backdrop-filter:blur(20px) saturate(1.4);backdrop-filter:blur(20px) saturate(1.4);border-bottom:1px solid var(--surface-edge);box-shadow:var(--shadow-soft);}
.icon-btn{width:44px;height:44px;border-radius:14px;flex:none;font-size:20px;display:grid;place-items:center;background:var(--surface-strong);box-shadow:var(--shadow-soft);color:var(--ink-700);border:none;cursor:pointer;font-family:var(--font-round);font-weight:800;}
.p-titlewrap{flex:1;min-width:0;text-align:center;line-height:1.05;}
.p-title{font-family:var(--font-round);font-weight:800;font-size:calc(17px*var(--fs));color:var(--ink-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.p-region{font-size:calc(11.5px*var(--fs));font-weight:700;color:#fff;background:var(--accent);border-radius:8px;padding:1px 8px;display:inline-block;margin-top:2px;}
.mode-seg{display:flex;background:var(--surface-strong);border:1.5px solid var(--surface-edge);border-radius:13px;overflow:hidden;flex:none;}
.mode-seg button{border:none;background:transparent;padding:8px 11px;font-family:var(--font-round);font-weight:700;font-size:calc(13px*var(--fs));color:var(--ink-600);cursor:pointer;white-space:nowrap;}
.mode-seg button[aria-pressed="true"]{background:var(--accent);color:#fff;}
.p-ring{width:44px;height:44px;flex:none;position:relative;}
.p-ring svg{transform:rotate(-90deg);} .p-ring .bg2{stroke:rgba(120,130,150,.25);} .p-ring .fg2{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .5s var(--ease-out-soft);}
.p-ring .lbl{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--font-round);font-weight:800;font-size:calc(12px*var(--fs));color:var(--ink-700);}

.photo-wrap{flex:1;min-height:0;position:relative;display:grid;place-items:center;padding:10px;}
.photo-frame{position:relative;border-radius:var(--photo-radius,20px);box-shadow:var(--photo-shadow);overflow:visible;}
.photo-frame img{width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit;}
.photo-scrim{position:absolute;inset:0;border-radius:inherit;pointer-events:none;
  background:linear-gradient(rgba(12,16,28,.16),transparent 16%,transparent 80%,rgba(12,16,28,.18));}
.p-arrow{position:absolute;top:50%;transform:translateY(-50%);width:50px;height:50px;border-radius:50%;z-index:25;
  background:var(--surface-strong);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);box-shadow:var(--shadow-glass);border:1px solid var(--surface-stroke);
  display:grid;place-items:center;font-size:22px;color:var(--ink-700);cursor:pointer;font-family:var(--font-round);font-weight:800;}
.p-arrow.prev{left:max(8px,env(safe-area-inset-left));} .p-arrow.next{right:max(8px,env(safe-area-inset-right));}
.p-hint{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);z-index:25;font-size:calc(13px*var(--fs));font-weight:700;color:var(--ink-700);
  background:var(--surface-strong);padding:8px 14px;border-radius:14px;box-shadow:var(--shadow-soft);pointer-events:none;transition:opacity .3s;}

/* hotspot dot */
.hs{position:absolute;width:52px;height:52px;transform:translate(-50%,-50%);background:none;border:none;padding:0;cursor:pointer;touch-action:manipulation;z-index:5;}
.hs .glow{position:absolute;inset:-9px;border-radius:50%;background:var(--hcol);opacity:.30;animation:dot-pulse 2.4s var(--ease-out-soft) infinite;animation-delay:var(--hd,0s);}
.hs .core{position:absolute;top:50%;left:50%;width:24px;height:24px;border-radius:50%;transform:translate(-50%,-50%);
  background:var(--hcol);border:2.5px solid #fff;box-shadow:0 0 0 4px var(--hring),0 3px 10px -2px rgba(20,28,48,.6);
  display:grid;place-items:center;font-size:12px;line-height:1;transition:width .2s var(--ease-anticipate),height .2s var(--ease-anticipate),background .2s;}
.hs.said .core,.hs.found .core{width:26px;height:26px;}
.hs.said .core{background:var(--hcol);box-shadow:0 0 0 4px rgba(242,181,60,.55),0 3px 10px -2px rgba(20,28,48,.6);}
.hs.said .core::after{content:"✓";color:#fff;font-weight:900;font-size:13px;}
.hs.found:not(.said) .core::after{content:"";}
.hs.found:not(.said) .glow{opacity:.18;}
.hs.said .glow{opacity:.16;animation:none;}
.hs.said,.hs.found{opacity:.92;}
.hs:focus-visible{outline:3px solid #fff;outline-offset:0;border-radius:50%;}
/* challenge mode: dots dimmed + uniform */
#screen-picture.challenge .hs:not(.said) .core{background:rgba(255,255,255,.88);border-color:rgba(40,50,70,.7);border-style:dashed;}
#screen-picture.challenge .hs:not(.said) .core::after{content:"?";color:#23293a;font-weight:900;font-size:13px;}
#screen-picture.challenge .hs:not(.said) .glow{opacity:.14;background:rgba(120,130,150,.7);}
@keyframes dot-pulse{0%,100%{transform:scale(1);opacity:.30;}50%{transform:scale(1.5);opacity:.10;}}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-6px) rotate(2deg);}}

/* reveal card */
.card-scrim{position:fixed;inset:0;z-index:70;background:rgba(16,20,32,.10);opacity:0;pointer-events:none;transition:opacity .2s;}
.card-scrim.show{opacity:1;pointer-events:auto;}
.rcard{position:fixed;z-index:80;width:min(290px,80vw);border-radius:22px;padding:15px 16px 14px;opacity:0;pointer-events:none;
  background:rgba(255,255,255,.92);-webkit-backdrop-filter:blur(26px) saturate(1.5);backdrop-filter:blur(26px) saturate(1.5);
  border:1.5px solid rgba(255,255,255,.85);box-shadow:0 0 0 5px var(--cring),0 22px 50px -18px rgba(20,28,48,.6);
  transform:scale(.86);transition:opacity .2s,transform .34s var(--ease-anticipate);}
.rcard.show{opacity:1;pointer-events:auto;transform:scale(1);}
.rcard.as-sheet{position:fixed;left:0;right:0;bottom:0;top:auto;width:auto;max-width:560px;margin:0 auto;border-radius:26px 26px 0 0;
  transform:translateY(105%);transition:transform .3s var(--ease-anticipate),opacity .2s;padding-bottom:max(18px,env(safe-area-inset-bottom));}
.rcard.as-sheet.show{transform:translateY(0);}
.rcard .grab{width:40px;height:5px;border-radius:3px;background:rgba(120,130,150,.4);margin:-4px auto 10px;display:none;}
.rcard.as-sheet .grab{display:block;}
.rc-close{position:absolute;top:10px;right:11px;width:30px;height:30px;border-radius:9px;border:none;background:rgba(120,130,150,.14);color:var(--ink-600);font-size:16px;cursor:pointer;font-weight:800;display:grid;place-items:center;}
.rc-chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-round);font-weight:800;font-size:calc(12px*var(--fs));color:#fff;background:var(--cinkbg);padding:4px 10px;border-radius:10px;}
.rc-word{font-family:var(--font-round);font-weight:800;font-size:calc(25px*var(--fs));color:var(--ink-900);line-height:1.1;margin:11px 0 0;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.rc-de{font-size:calc(13px*var(--fs));font-weight:600;color:var(--ink-600);}
.rc-spk{width:30px;height:30px;border-radius:9px;border:none;background:color-mix(in srgb,var(--ccore) 14%, white);color:var(--ccore);cursor:pointer;font-size:15px;display:grid;place-items:center;flex:none;}
.rc-where{display:flex;align-items:center;gap:6px;font-size:calc(13px*var(--fs));color:var(--ink-600);font-weight:600;margin:8px 0 0;}
.rc-where b{color:var(--ccore);}
.rc-model{margin:11px 0 0;padding:11px 13px;border-radius:14px;background:color-mix(in srgb,var(--ccore) 9%, white);
  border:1px solid color-mix(in srgb,var(--ccore) 20%, transparent);font-size:calc(15.5px*var(--fs));line-height:1.4;color:var(--ink-900);font-weight:500;}
.rc-saymore{margin:9px 0 0;font-size:calc(13.5px*var(--fs));color:var(--ink-700);display:flex;gap:6px;align-items:baseline;line-height:1.4;}
.rc-saymore .plus{color:var(--ccore);font-weight:800;flex:none;}
.rc-said{margin:14px 0 0;width:100%;background:var(--ccore);font-size:calc(16px*var(--fs));padding:13px;border-radius:14px;}
.rc-said.done2{background:var(--gold);}
.rc-cover{text-align:center;padding:6px 0 2px;}
.rc-cover .ct{font-family:var(--font-round);font-weight:800;font-size:calc(18px*var(--fs));margin:6px 0;color:var(--ink-900);}
.rc-cover .cs{font-size:calc(13.5px*var(--fs));color:var(--ink-600);margin-bottom:12px;}
.rc-selfcheck{display:flex;gap:8px;margin:12px 0 0;}
.rc-selfcheck button{flex:1;font-family:var(--font-round);font-weight:700;font-size:calc(14px*var(--fs));padding:11px;border-radius:13px;border:1.5px solid var(--surface-edge);background:var(--surface-strong);color:var(--ink-700);cursor:pointer;}
.rc-selfcheck button.good{background:color-mix(in srgb,var(--success) 16%, white);color:#0a7d57;border-color:transparent;}

/* completion end card */
.end-scrim{position:fixed;inset:0;z-index:85;background:rgba(12,16,28,.4);opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(3px);}
.end-scrim.show{opacity:1;pointer-events:auto;}
.end-card{position:fixed;left:50%;bottom:0;transform:translate(-50%,105%);z-index:86;width:min(460px,100%);
  border-radius:26px 26px 0 0;padding:26px 24px max(26px,env(safe-area-inset-bottom));text-align:center;opacity:0;pointer-events:none;
  transition:transform .4s var(--ease-anticipate),opacity .3s;}
.end-card.show{transform:translate(-50%,0);opacity:1;pointer-events:auto;}
@media(min-height:640px){.end-card{bottom:auto;top:50%;transform:translate(-50%,-46%) scale(.96);border-radius:26px;}
  .end-card.show{transform:translate(-50%,-50%) scale(1);}}
.end-medal{width:74px;height:74px;border-radius:50%;background:var(--success);display:grid;place-items:center;margin:0 auto 8px;color:#fff;font-size:40px;font-weight:900;box-shadow:0 12px 26px -10px var(--success);animation:medal-pop .7s var(--ease-anticipate) both;}
@keyframes medal-pop{0%{transform:scale(0) rotate(-25deg);opacity:0;}60%{transform:scale(1.16);}100%{transform:scale(1);opacity:1;}}
.end-card h2{font-family:var(--font-round);font-size:calc(24px*var(--fs));margin:4px 0 4px;}
.end-stats{display:flex;justify-content:center;gap:18px;margin:14px 0 4px;}
.end-stats .s{display:flex;flex-direction:column;}
.end-stats .v{font-family:var(--font-round);font-weight:800;font-size:calc(22px*var(--fs));color:var(--ink-900);}
.end-stats .k{font-size:calc(11px*var(--fs));color:var(--ink-400);font-weight:700;}
.end-actions{display:flex;flex-direction:column;gap:9px;margin-top:18px;}
.model-box{margin:14px 0 0;padding:14px 15px;border-radius:16px;background:var(--surface-strong);box-shadow:var(--shadow-soft);text-align:left;display:none;}
.model-box.show{display:block;animation:fadein .3s ease both;}
.model-box .mt{font-family:var(--font-round);font-weight:800;font-size:calc(14px*var(--fs));color:var(--ink-700);margin-bottom:8px;}
.model-box p{margin:0;line-height:1.55;font-size:calc(15px*var(--fs));}
.model-box .ln{display:block;}
@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}

/* onboarding + offline pill + toast */
.ob-back{position:fixed;inset:0;z-index:95;background:rgba(16,20,32,.5);display:none;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(4px);}
.ob-back.show{display:flex;}
.ob-card{width:min(380px,100%);text-align:center;padding:28px 24px;border-radius:var(--radius-card);}
.ob-emoji{font-size:54px;line-height:1;}
.ob-card h3{font-family:var(--font-round);font-size:calc(20px*var(--fs));margin:10px 0;}
.ob-dots{display:flex;gap:7px;justify-content:center;margin:16px 0 6px;}
.ob-dots i{width:8px;height:8px;border-radius:50%;background:rgba(120,130,150,.35);}
.ob-dots i.on{background:var(--accent);width:22px;border-radius:5px;}
.offline-pill{position:fixed;left:50%;bottom:calc(14px + env(safe-area-inset-bottom));transform:translateX(-50%) translateY(20px);z-index:88;
  font-size:calc(13px*var(--fs));font-weight:700;color:var(--ink-700);padding:9px 15px;border-radius:14px;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;}
.offline-pill.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast{position:fixed;left:50%;top:calc(64px + env(safe-area-inset-top));transform:translate(-50%,-16px);z-index:88;padding:9px 16px;border-radius:14px;
  font-weight:700;font-size:calc(14px*var(--fs));color:var(--ink-900);opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;}
.toast.show{opacity:1;transform:translate(-50%,0);}

@media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;}}
.reduce-motion .hs .glow,.reduce-motion .logo-badge{animation:none!important;}

let actx=null;

  try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)(); const o=actx.createOscillator(),g=actx.createGain();
    o.type=type;o.frequency.value=freq;o.connect(g);g.connect(actx.destination);const t=actx.currentTime;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.012);g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.start(t);o.stop(t+dur+.02);}catch(e){} }

/* ============================================================ *
 *  WEBGL AURORA (reused from Speak Up!)                        *
 * ============================================================ */
const Aurora=(function(){
  const cv=$("#bg"); let gl,prog,uni={},raf=0,t=0,last=0,enabled=true,paused=false,degrade=0,fpsSamples=[];
  let speed=0.035,lift=0.18,targetSpeed=0.035,targetLift=0.18;
  const VS="attribute vec2 p;void main(){gl_Position=vec4(p,0.,1.);}";
  const FS=`precision highp float;uniform vec2 u_res;uniform float u_time;uniform float u_lift;uniform vec3 c0;uniform vec3 c1;uniform vec3 c2;uniform vec3 c3;
  float hash(vec2 p){p=fract(p*vec2(123.34,456.21));p+=dot(p,p+45.32);return fract(p.x*p.y);}
  float noise(vec2 p){vec2 i=floor(p),f=fract(p);float a=hash(i),b=hash(i+vec2(1,0)),c=hash(i+vec2(0,1)),d=hash(i+vec2(1,1));vec2 u=f*f*(3.-2.*f);return mix(a,b,u.x)+(c-a)*u.y*(1.-u.x)+(d-b)*u.x*u.y;}
  float fbm(vec2 p){float v=0.,a=.5;for(int i=0;i<2;i++){v+=a*noise(p);p*=2.0;a*=.5;}return v;}
  void main(){vec2 uv=gl_FragCoord.xy/u_res.xy;float ar=u_res.x/u_res.y;vec2 p=vec2(uv.x*ar,uv.y)*1.5;float t=u_time;
   vec2 w=vec2(fbm(p+vec2(0.,t)),fbm(p+vec2(5.2,-t*0.8)));float n=fbm(p+w*1.4+t*0.3);float m=fbm(p*1.25-w+t*0.2);
   vec3 col=mix(c0,c1,smoothstep(.15,.85,n));col=mix(col,c2,smoothstep(.3,.95,m));col=mix(col,c3,smoothstep(.45,1.0,n*m+0.2));
   col=mix(col,vec3(1.0),u_lift);col+=(hash(gl_FragCoord.xy)-0.5)*0.012;gl_FragColor=vec4(col,1.0);}`;
  function compile(ty,src){const s=gl.createShader(ty);gl.shaderSource(s,src);gl.compileShader(s);if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(s);return s;}
  function init(){ try{
      gl=cv.getContext("webgl",{antialias:false,depth:false,alpha:true,premultipliedAlpha:false,powerPreference:"low-power"})||cv.getContext("experimental-webgl");
      if(!gl)throw"no-webgl"; prog=gl.createProgram();
      gl.attachShader(prog,compile(gl.VERTEX_SHADER,VS));gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FS));gl.linkProgram(prog);
      if(!gl.getProgramParameter(prog,gl.LINK_STATUS))throw"link"; gl.useProgram(prog);
      const buf=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,buf);gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
      const loc=gl.getAttribLocation(prog,"p");gl.enableVertexAttribArray(loc);gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
      ["u_res","u_time","u_lift","c0","c1","c2","c3"].forEach(n=>uni[n]=gl.getUniformLocation(prog,n));
      cv.addEventListener("webglcontextlost",e=>{e.preventDefault();enabled=false;cancelAnimationFrame(raf);cv.style.display="none";},false);
      resize(); setRegion(S.region); enabled=true; loop(0);
    }catch(e){ enabled=false; cv.style.display="none"; } }
  function resize(){ if(!gl)return; const dpr=Math.min(1.5,window.devicePixelRatio||1)*0.5;
    const w=Math.max(2,Math.floor(innerWidth*dpr)),h=Math.max(2,Math.floor(innerHeight*dpr)); cv.width=w;cv.height=h;gl.viewport(0,0,w,h);
    if(uni.u_res)gl.uniform2f(uni.u_res,w,h); }
  function setRegion(r){ if(!gl)return; const c=REGIONS[r].c.map(hex=>{const n=parseInt(hex.slice(1),16);return[((n>>16)&255)/255,((n>>8)&255)/255,(n&255)/255];});
    gl.useProgram(prog); gl.uniform3fv(uni.c0,c[0]);gl.uniform3fv(uni.c1,c[1]);gl.uniform3fv(uni.c2,c[2]);gl.uniform3fv(uni.c3,c[3]); }
  function loop(ts){ raf=requestAnimationFrame(loop); if(!enabled||!gl)return; if(document.hidden||paused){last=ts;return;}
    const dt=ts-last; const gate=degrade>=1?50:33; if(dt<gate)return;
    if(last){fpsSamples.push(1000/dt);if(fpsSamples.length>40)fpsSamples.shift();} last=ts;
    speed+=(targetSpeed-speed)*0.06;lift+=(targetLift-lift)*0.06;
    if(!reducedActive())t+=(dt/1000)*speed; gl.uniform1f(uni.u_time,reducedActive()?12.0:t); gl.uniform1f(uni.u_lift,lift); gl.drawArrays(gl.TRIANGLES,0,3);
    if(fpsSamples.length>=30){const avg=fpsSamples.reduce((a,b)=>a+b,0)/fpsSamples.length;
      if(avg<30&&degrade<2){degrade++;fpsSamples=[];if(degrade>=2){enabled=false;cv.style.display="none";}}
      else if(avg<46&&degrade<1){degrade=1;fpsSamples=[];}} }
  return { init,resize,setRegion, pause(){paused=true;}, resume(){paused=false;last=0;},
    pulse(){targetSpeed=0.09;targetLift=0.26;setTimeout(()=>{targetSpeed=0.035;targetLift=0.18;},650);},
    get degrade(){return degrade;} };
})();

/* ============================================================ *
 *  CANVAS2D PARTICLES + CONFETTI (reused from Speak Up!)       *
 * ============================================================ */
const FX=(function(){
  const cv=$("#fx"),ctx=cv.getContext("2d"); let parts=[],confetti=[],rings=[],raf=0,running=false,last=0;
  function resize(){const dpr=Math.min(2,window.devicePixelRatio||1);cv.width=innerWidth*dpr;cv.height=innerHeight*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}
  function ensure(){if(!running){running=true;last=0;raf=requestAnimationFrame(loop);}}
  function burst(x,y,color,opts){ opts=opts||{}; if(reducedActive()){ring(x,y,color);return;}
    let n=opts.count||(Aurora.degrade>=1?10:18); if(parts.length>110)n=Math.min(n,8);
    for(let i=0;i<n;i++){const ang=Math.random()*Math.PI*2,sp=120+Math.random()*140,star=i<Math.max(2,n*0.22);
      parts.push({x,y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp-40,r:star?6+Math.random()*3:2.5+Math.random()*2.5,life:560+Math.random()*200,age:0,
        col:i%6===0?"#46E3A4":(i%3===0?"#ffffff":color),star});}
    ring(x,y,color); blip(460+Math.random()*120,0.07,"triangle",0.045); ensure(); }
  function ring(x,y,color){ if(reducedActive()&&rings.length>4)return; rings.push({x,y,col:color,age:0,life:360}); ensure(); }
  function confettiBurst(){ if(reducedActive()){for(let i=0;i<60;i++)confetti.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight*0.6,vx:0,vy:0,r:5+Math.random()*5,col:cc(),rot:0,vr:0,age:0,life:1});ensure();return;}
    for(let i=0;i<120;i++)confetti.push({x:innerWidth*(0.2+Math.random()*0.6),y:-20-Math.random()*120,vx:(Math.random()-0.5)*120,vy:120+Math.random()*180,r:5+Math.random()*6,col:cc(),rot:Math.random()*6.28,vr:(Math.random()-0.5)*8,age:0,life:2600+Math.random()*1400}); ensure(); }
  function cc(){const a=["#FF5470","#FFB13C","#36D6A0","#5B9BFF","#A98BFF","#FFD93C","#E477F2"];return a[(Math.random()*a.length)|0];}
  function loop(ts){ const dt=last?Math.min(50,ts-last):16;last=ts; ctx.clearRect(0,0,innerWidth,innerHeight); const healthy=Aurora.degrade<1;
    ctx.globalCompositeOperation=healthy?"source-over":"lighter";
    for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.age+=dt;const k=p.age/p.life;if(k>=1){parts.splice(i,1);continue;}
      p.vx*=0.92;p.vy=p.vy*0.92+520*(dt/1000);p.x+=p.vx*(dt/1000);p.y+=p.vy*(dt/1000);const a=(1-k)*(1-k),r=p.r*(0.6+0.4*(1-k));
      ctx.globalAlpha=a; if(healthy){ctx.shadowBlur=8;ctx.shadowColor=p.col;}else ctx.shadowBlur=0; ctx.fillStyle=p.col;
      if(p.star)star(p.x,p.y,r); else {ctx.beginPath();ctx.arc(p.x,p.y,r,0,6.2832);ctx.fill();}}
    ctx.shadowBlur=0;ctx.globalCompositeOperation="source-over";
    for(let i=rings.length-1;i>=0;i--){const r=rings[i];r.age+=dt;const k=r.age/r.life;if(k>=1){rings.splice(i,1);continue;}
      ctx.globalAlpha=0.5*(1-k);ctx.strokeStyle=r.col;ctx.lineWidth=3*(1-k);ctx.beginPath();ctx.arc(r.x,r.y,4+k*46,0,6.2832);ctx.stroke();}
    for(let i=confetti.length-1;i>=0;i--){const c=confetti[i];c.age+=dt;const k=c.age/c.life;if(k>=1){confetti.splice(i,1);continue;}
      if(c.vy){c.vy+=240*(dt/1000);c.x+=c.vx*(dt/1000);c.y+=c.vy*(dt/1000);c.rot+=c.vr*(dt/1000);}
      ctx.globalAlpha=clamp(1-k*0.7,0,1);ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);ctx.fillStyle=c.col;ctx.fillRect(-c.r/2,-c.r/2,c.r,c.r*0.6);ctx.restore();}
    ctx.globalAlpha=1; if(parts.length||rings.length||confetti.length)raf=requestAnimationFrame(loop); else running=false; }
  function star(x,y,r){ctx.beginPath();for(let i=0;i<5;i++){const o=i*2*Math.PI/5-Math.PI/2;ctx.lineTo(x+Math.cos(o)*r,y+Math.sin(o)*r);const o2=o+Math.PI/5;ctx.lineTo(x+Math.cos(o2)*r*0.45,y+Math.sin(o2)*r*0.45);}ctx.closePath();ctx.fill();}
  function clear(){parts=[];confetti=[];rings=[];ctx.clearRect(0,0,innerWidth,innerHeight);}
  return {resize,burst,ring,confettiBurst,clear};
})();

function applyRegion(r){ S.region=r; document.body.dataset.region=r; const R=REGIONS[r];
  document.body.style.setProperty("--accent",R.accent); document.body.style.setProperty("--accent-2",R.accent2); Aurora.setRegion(r); }
function ringDash(r){ return (2*Math.PI*r).toFixed(1); }

function renderGallery(){
  applyRegion("london");
  const root=$("#galleryBody"); root.innerHTML="";
  REGION_ORDER.forEach(reg=>{
    const pics=PICTURES.filter(p=>p.region===reg);
    const sec=document.createElement("section"); sec.className="region-sec"; sec.dataset.region=reg;
    const head=document.createElement("div"); head.className="region-head";
    head.innerHTML=`<span class="region-dot" style="background:${REGIONS[reg].accent}"></span><span class="region-title">${REGIONS[reg].label}</span><span class="region-count">${pics.length} pictures</span>`;
    sec.appendChild(head);
    const grid=document.createElement("div"); grid.className="thumb-grid";
    pics.forEach(p=>{
      const total=p.hs.length, said=saidCount(p.id), done=isDone(p.id);
      const C=2*Math.PI*15;
      const btn=document.createElement("button"); btn.className="thumb"+(done?" done":""); btn.setAttribute("aria-label",`${p.title}, ${REGIONS[reg].label}, ${said} of ${total} done`);
      btn.innerHTML=`<img src="images/${p.slug}.jpg" alt="${p.title}" loading="lazy" decoding="async" width="800" height="600">
        <span class="rbadge" style="background:${REGIONS[reg].accent}"></span>
        <svg class="pring" viewBox="0 0 34 34"><circle class="bg2" cx="17" cy="17" r="15" fill="none" stroke-width="3"/><circle class="fg2" cx="17" cy="17" r="15" fill="none" stroke-width="3" stroke-dasharray="${ringDash(15)}" stroke-dashoffset="${(C*(1-said/total)).toFixed(1)}" transform="rotate(-90 17 17)"/></svg>
        <span class="donecheck">✓</span>
        <span class="label"><span class="t">${p.title}</span><span class="s">${total} dots${said?` · ${said} said`:""}</span></span>`;
      btn.addEventListener("click",()=>openPicture(p.id));
      grid.appendChild(btn);
    });
    sec.appendChild(grid); root.appendChild(sec);
  });
  updateGlobalMeter();
}
function updateGlobalMeter(){ const d=globalDone(); $("#globalMeter").style.width=(d/PICTURES.length*100)+"%"; $("#globalMeterLbl").textContent=`${d} / ${PICTURES.length}`; }
function filterRegion(r){ $$(".region-sec").forEach(s=>s.classList.toggle("hide", r!=="all"&&s.dataset.region!==r));
  $$("#regionFilter .rf").forEach(b=>b.setAttribute("aria-pressed", b.dataset.region===r)); }

 *  PICTURE VIEW                                               *

let curPic=null, photoBox={x:0,y:0,w:0,h:0};
function openPicture(id){
  curPic=PIC_BY_ID[id];
  applyRegion(curPic.region);
  Aurora.pause(); FX.clear();
  $("#pTitle").textContent=curPic.title;
  $("#pRegion").textContent=REGIONS[curPic.region].label;
  $("#screen-picture").classList.toggle("challenge", S.mode==="challenge");
  $$("#modeSeg button").forEach(b=>b.setAttribute("aria-pressed",b.dataset.mode===S.mode));
  const img=$("#photoImg"); img.src="images/"+curPic.slug+".jpg"; img.alt=curPic.title;
  img.onerror=()=>{ img.onerror=null; img.removeAttribute("src"); $("#photoFrame").style.background="linear-gradient(135deg,#cdd7e6,#dfe6f0)"; };
  $("#photoFrame").style.aspectRatio=curPic.ar.replace("/"," / ");
  app.dataset.screen="picture";
  layoutPhoto(); renderHotspots(); updatePRing();
  // start time tracking
  curPic._t0=Date.now();
  $("#pHint").style.opacity = saidCount(id)>0 ? "0" : "1";
  if(!S.onboardingSeen) showOnboarding();
  save();
}
function layoutPhoto(){
  if(!curPic) return;
  const wrap=$("#photoWrap"); const pad=parseFloat(getComputedStyle(wrap).paddingLeft)||10;
  const availW=wrap.clientWidth-pad*2, availH=wrap.clientHeight-pad*2;
  const [aw,ah]=curPic.ar.split("/").map(Number); const ar=aw/ah;
  let w=availW, h=w/ar; if(h>availH){ h=availH; w=h*ar; }
  const frame=$("#photoFrame");
  frame.style.width=w+"px"; frame.style.height=h+"px";
  const fr=frame.getBoundingClientRect();
  photoBox={x:fr.left,y:fr.top,w:fr.width,h:fr.height};
}
function renderHotspots(){
  const frame=$("#photoFrame");
  frame.querySelectorAll(".hs").forEach(e=>e.remove());
  const said=saidSet(curPic.id), found=foundSet(curPic.id);
  curPic.hs.forEach((h,i)=>{
    const c=CATS[h.cat];
    const b=document.createElement("button"); b.className="hs"+(said[i]?" said":(found[i]?" found":""));
    b.style.left=(h.nx*100)+"%"; b.style.top=(h.ny*100)+"%";
    b.style.setProperty("--hcol",c.core); b.style.setProperty("--hring","rgba("+c.glow+",.35)"); b.style.setProperty("--hd",(i*0.12)+"s");
    b.setAttribute("aria-label","Tip: "+h.word);
    b.innerHTML=`<span class="glow"></span><span class="core"></span>`;
    b.addEventListener("click",(e)=>{e.stopPropagation();openCard(i,b);});
    frame.appendChild(b);
  });
}
function updatePRing(){
  const total=curPic.hs.length, said=saidCount(curPic.id), C=2*Math.PI*18;
  $("#pRingFg").style.strokeDasharray=C.toFixed(1);
  $("#pRingFg").style.strokeDashoffset=(C*(1-said/total)).toFixed(1);
  $("#pRingLbl").textContent=said+"/"+total;
}

/* ---------- reveal card ---------- */
let cardOpenIdx=-1;
function openCard(i,dotEl){
  const h=curPic.hs[i], c=CATS[h.cat];
  const found=foundSet(curPic.id), said=saidSet(curPic.id);
  const firstReveal=!found[i];
  found[i]=true;
  if(!dotEl.classList.contains("said")) dotEl.classList.add("found");
  cardOpenIdx=i;
  const card=$("#rcard");
  card.style.setProperty("--ccore",c.core);
  card.style.setProperty("--cinkbg",c.core);
  card.style.setProperty("--cring","rgba("+c.glow+",.18)");
  const challengeHidden = (S.mode==="challenge" && !said[i]);
  card.innerHTML = challengeHidden ? coverHTML(h,c) : fullHTML(h,c,i,said[i]);
  wireCard(card,h,i,dotEl,c);
  // position
  const dot=dotEl.getBoundingClientRect();
  const dx=dot.left+dot.width/2, dy=dot.top+dot.height/2;
  const sheet = innerWidth<820;   // iPad portrait (768) uses the bottom drawer so the card never covers the photo
  card.classList.toggle("as-sheet",sheet);
  $("#cardScrim").classList.add("show");
  card.classList.remove("show"); card.style.left=""; card.style.top="";
  if(!sheet) positionCard(card,dx,dy);   // offsetWidth/Height are valid at opacity:0 (no rAF needed)
  // force a reflow so the show transition plays from the hidden state
  void card.offsetWidth;
  card.classList.add("show");
  if(firstReveal && !challengeHidden) FX.burst(dx,dy,c.core,{count:14});
  $("#pHint").style.opacity="0";
  const f=card.querySelector("button"); if(f) try{f.focus({preventScroll:true});}catch(e){}
  save();
}
function positionCard(card,dx,dy){
  const m=12, off=26; const cw=card.offsetWidth, ch=card.offsetHeight;
  let left=clamp(dx-cw/2, m, innerWidth-cw-m), top;
  const below=dy+off, above=dy-off-ch;
  if(below+ch<=innerHeight-m) top=below;
  else if(above>=m) top=above;
  else top=clamp(dy-ch/2, m, innerHeight-ch-m);
  card.style.left=left+"px"; card.style.top=top+"px";
}
function coverHTML(h,c){
  return `<button class="rc-close" aria-label="Close">✕</button>
   <span class="rc-chip">${c.emoji} ${c.label}</span>
   <div class="rc-cover">
     <div style="font-size:34px;margin-top:6px">🎯</div>
     <div class="ct">Can you say it?</div>
     <div class="cs">Look at this spot and say it out loud — then check.</div>
   </div>
   <button class="btn rc-said" data-act="reveal">Check answer ✓</button>`;
}
function fullHTML(h,c,i,already){
  const spk = (S.mode!=="challenge") ? `<button class="rc-spk" data-act="speak" aria-label="Hear it">🔊</button>` : "";
  const de = h.de ? `<span class="rc-de">${h.de}</span>` : "";
  const challenge = S.mode==="challenge";
  const checkLine = challenge ? `<div style="font-size:13px;font-weight:700;color:var(--ink-600);margin-top:10px;text-align:center">Did you say something like this?</div>` : "";
  const bottom = challenge
    ? `<button class="btn rc-said done2" data-act="close">Got it 👍</button>`
    : `<button class="btn rc-said ${already?'done2':''}" data-act="said">${already?'Said ✓ — say it again!':'I said it ✓'}</button>`;
  return `<button class="rc-close" aria-label="Close">✕</button>
   <span class="rc-chip">${c.emoji} ${c.label}</span>
   <div class="rc-word">${spk}<span>${h.word}</span>${de}</div>
   <div class="rc-where">📍 <span><b>${firstWhere(h.where)}</b>${restWhere(h.where)}</span></div>
   ${checkLine}
   <div class="rc-model">${h.model}</div>
   <div class="rc-saymore"><span class="plus">+ say more</span><span>${h.model.replace(/\.$/,"")}, ${h.more}.</span></div>
   ${bottom}`;
}
function firstWhere(w){ return w.split(",")[0]; }
function restWhere(w){ const p=w.split(","); return p.length>1?","+p.slice(1).join(","):""; }
function hl(sentence){ return sentence; }
function wireCard(card,h,i,dotEl,c){
  card.querySelectorAll("[data-act]").forEach(el=>{
    el.addEventListener("click",ev=>{
      ev.stopPropagation(); const act=el.dataset.act;
      if(act==="reveal"){ markSaid(i,dotEl,c); // reveal full in challenge after saying
        card.innerHTML=fullHTML(h,c,i,true); wireCard(card,h,i,dotEl,c);
        const dot=dotEl.getBoundingClientRect(); if(innerWidth>=820) positionCard(card,dot.left+dot.width/2,dot.top+dot.height/2);
        return; }
      if(act==="said"){ markSaid(i,dotEl,c); el.classList.add("done2"); el.textContent="Said ✓"; setTimeout(closeCard,420); return; }
      if(act==="close"){ closeCard(); return; }
      if(act==="speak"){ speak(h.word); return; }
    });
  });
  const cl=card.querySelector(".rc-close"); if(cl) cl.addEventListener("click",e=>{e.stopPropagation();closeCard();});
}
function markSaid(i,dotEl,c){
  const said=saidSet(curPic.id); const wasDone=isDone(curPic.id);
  if(!said[i]){ said[i]=true;
    dotEl.classList.remove("found"); dotEl.classList.add("said");
    const dot=dotEl.getBoundingClientRect(); FX.burst(dot.left+dot.width/2,dot.top+dot.height/2,c.core,{count:12});
    updatePRing(); save();
    if(!wasDone && isDone(curPic.id)) setTimeout(completePicture,360);
  }
}
function closeCard(){ const card=$("#rcard"); card.classList.remove("show"); $("#cardScrim").classList.remove("show"); cardOpenIdx=-1;
  setTimeout(()=>{ if(!card.classList.contains("show")) card.innerHTML=""; },240); // orphan stray handlers + remove focusable button behind scrim
  if(curPic) $("#pHint").style.opacity = saidCount(curPic.id)>0 ? "0" : "1"; }

/* speech synthesis (off by default, en-GB, never autoplay) */
let voicesLoaded=false;
function speak(text){ if(!("speechSynthesis"in window))return; try{ speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang="en-GB"; u.rate=0.9;
  const vs=speechSynthesis.getVoices(); const gb=vs.find(v=>/en-GB/i.test(v.lang))||vs.find(v=>/en/i.test(v.lang)); if(gb)u.voice=gb;
  speechSynthesis.speak(u);}catch(e){} }

/* ---------- completion ---------- */
function completePicture(){
  const time=Math.max(1,Math.round((Date.now()-(curPic._t0||Date.now()))/1000));
  const total=curPic.hs.length;
  $("#endHead").textContent=`You can describe ${curPic.title}! 🎉`;
  $("#endStats").innerHTML=`<div class="s"><span class="v">${total}</span><span class="k">words learned</span></div>
    <div class="s"><span class="v">${total}</span><span class="k">said out loud</span></div>
    <div class="s"><span class="v">${Math.floor(time/60)}:${String(time%60).padStart(2,"0")}</span><span class="k">time</span></div>`;
  $("#modelText").innerHTML=curPic.model.match(/[^.!?]+[.!?]+/g).map(s=>`<span class="ln">${s.trim()}</span>`).join(" ");
  $("#modelBox").classList.remove("show");
  closeCard();
  $("#endScrim").classList.add("show"); $("#endCard").classList.add("show");
  FX.confettiBurst(); Aurora.pulse();
  updateGlobalMeter();
  save();
}
function closeEnd(){ $("#endScrim").classList.remove("show"); $("#endCard").classList.remove("show"); }
function gotoGallery(){ closeEnd(); closeCard(); Aurora.resume(); app.dataset.screen="gallery"; renderGallery(); }
function nextPicture(){
  const idx=PICTURES.indexOf(curPic);
  // prefer next not-done, else next
  let n=null;
  for(let k=1;k<=PICTURES.length;k++){ const cand=PICTURES[(idx+k)%PICTURES.length]; if(!isDone(cand.id)){n=cand;break;} }
  if(!n) n=PICTURES[(idx+1)%PICTURES.length];
  closeEnd(); openPicture(n.id);
}
function siblingPicture(dir){
  const idx=PICTURES.indexOf(curPic); const n=PICTURES[(idx+dir+PICTURES.length)%PICTURES.length];
  closeCard(); openPicture(n.id);
}

/* ---------- toast ---------- */
let toastT=0;
function toast(msg){ const t=$("#toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("show"),1800); }

/* ---------- onboarding ---------- */
const OB=[{e:"👆",t:"Tap the glowing dots — learn the English word."},
  {e:"🗣️",t:"Say the sentence out loud, then tap “I said it ✓”."},
  {e:"🎯",t:"Found them all? Try Challenge — say them from memory."}];
let obi=0;
function showOnboarding(){ obi=0; renderOB(); $("#obBack").classList.add("show"); }
function renderOB(){ $("#obEmoji").textContent=OB[obi].e; $("#obTitle").textContent=OB[obi].t;
  $$("#obDots i").forEach((d,k)=>d.classList.toggle("on",k===obi)); $("#obNext").textContent=obi<OB.length-1?"Next":"Got it! 👍"; }

/* ---------- service worker / offline ---------- */
function registerSW(){
  if(!("serviceWorker"in navigator)) return;
  navigator.serviceWorker.register("sw.js").then(reg=>{
    navigator.serviceWorker.addEventListener("message",ev=>{ if(ev.data&&ev.data.type==="cached"){ showOffline("Ready offline ✓"); } });
  }).catch(()=>{});
}
function showOffline(txt){ const p=$("#offlinePill"); p.textContent=txt; p.classList.add("show"); setTimeout(()=>p.classList.remove("show"),2600); }

/* ============================================================ *
 *  INIT + EVENTS                                              *
 * ============================================================ */
function applyAll(){ document.documentElement.style.setProperty("--fs",S.fontScale||1);
  document.body.classList.toggle("reduce-motion",!!S.reducedMotion); }
function bind(){
  $("#regionFilter").addEventListener("click",e=>{const b=e.target.closest(".rf");if(!b)return;filterRegion(b.dataset.region);});
  $("#backBtn").addEventListener("click",gotoGallery);
  $("#modeSeg").addEventListener("click",e=>{const b=e.target.closest("button");if(!b)return;
    S.mode=b.dataset.mode; $$("#modeSeg button").forEach(x=>x.setAttribute("aria-pressed",x.dataset.mode===S.mode));
    $("#screen-picture").classList.toggle("challenge",S.mode==="challenge"); closeCard(); renderHotspots(); save();
    toast(S.mode==="challenge"?"Challenge mode 🎯 — words hidden":"Explore mode 🔍 — hints on");});
  $("#prevBtn").addEventListener("click",()=>siblingPicture(-1));
  $("#nextBtn").addEventListener("click",()=>siblingPicture(1));
  $("#cardScrim").addEventListener("click",closeCard);
  $("#endScrim").addEventListener("click",closeEnd);
  $("#sayAllBtn").addEventListener("click",()=>$("#modelBox").classList.toggle("show"));
  $("#speakupBtn").addEventListener("click",()=>{ location.href="index.html?region="+curPic.region; });
  $("#nextPicBtn").addEventListener("click",nextPicture);
  $("#backGalleryBtn").addEventListener("click",gotoGallery);
  $("#obNext").addEventListener("click",()=>{ if(obi<OB.length-1){obi++;renderOB();} else { $("#obBack").classList.remove("show"); S.onboardingSeen=true; save(); } });
  const dismissOB=()=>{ $("#obBack").classList.remove("show"); S.onboardingSeen=true; save(); };
  $("#obSkip").addEventListener("click",dismissOB);
  $("#obBack").addEventListener("click",e=>{ if(e.target===$("#obBack")) dismissOB(); });
  document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ if($("#rcard").classList.contains("show"))closeCard(); else if($("#endCard").classList.contains("show"))closeEnd(); else if($("#obBack").classList.contains("show")){$("#obBack").classList.remove("show");S.onboardingSeen=true;save();} } });
  let rz=0; window.addEventListener("resize",()=>{clearTimeout(rz);rz=setTimeout(()=>{Aurora.resize();FX.resize();if(app.dataset.screen==="picture"){layoutPhoto();closeCard();}},160);});
  window.addEventListener("orientationchange",()=>setTimeout(()=>{Aurora.resize();FX.resize();if(app.dataset.screen==="picture")layoutPhoto();},250));
}
function init(){
  const saved=store.read();
  S = (saved&&saved.v===1)? Object.assign(freshState(),saved) : freshState();
  applyAll(); bind();
  Aurora.init(); FX.resize();
  renderGallery();
  if(!store.ok){ toast("Heads up: your progress won't be saved on this device."); }
  registerSW();
  if("speechSynthesis"in window){ speechSynthesis.onvoiceschanged=()=>{voicesLoaded=true;}; speechSynthesis.getVoices(); }
}
if(document.readyState!=="loading") init(); else document.addEventListener("DOMContentLoaded",init);
})();
</script>
</body>
